; ================================================================
;  Analog Film Rotary Processor — PlatformIO 프로젝트
;  ESP32-S3 N16R8 (16MB Flash / 8MB PSRAM)
;
;  .ino → C++ OOP 마이그레이션. 소스는 src/ 아래 클래스 단위로 분리.
;  진단용 스케치는 tools/ 에 .ino 그대로 보존 (빌드 대상 아님).
; ================================================================
[env:esp32-s3-devkitc-1]
platform  = espressif32
board     = esp32-s3-devkitc-1
framework = arduino

; 16MB Flash + Octal PSRAM — 제네릭 보드(N8) 기본값을 N16R8로 강제 오버라이드
board_build.partitions   = partitions.csv
board_build.filesystem   = littlefs
board_upload.flash_size    = 16MB
board_build.flash_size     = 16MB
board_upload.maximum_size  = 16777216
board_build.arduino.memory_type = qio_opi   ; OPI PSRAM (N16R8)
build_flags =
    -DBOARD_HAS_PSRAM
    -DARDUINO_USB_CDC_ON_BOOT=1   ; 네이티브 USB 포트로 Serial 출력 (S3 모니터 무반응 해결)
    -DARDUINO_USB_MODE=1
    -DCORE_DEBUG_LEVEL=0        ; 0=None (vfs exists() [E]노이즈 억제). 내 Serial 로그는 유지. 디버그시 3
    -DUI_DISPLAY_PRESENT=1        ; 0 = 무디스플레이 변종 (displayTask 미생성)

monitor_speed = 115200
upload_speed  = 921600

; 헤더에 명시된 라이브러리 (버전은 호환 확인 후 핀 고정 권장)
lib_deps =
    bblanchon/ArduinoJson
    gin66/FastAccelStepper
    adafruit/Adafruit MAX31865 library
    adafruit/Adafruit GFX Library
    adafruit/Adafruit ST7735 and ST7789 Library
    olikraus/U8g2_for_Adafruit_GFX
    bodmer/TJpg_Decoder
    bitbank2/AnimatedGIF
    https://github.com/mathieucarbou/ESPAsyncWebServer.git
    https://github.com/mathieucarbou/AsyncTCP.git
